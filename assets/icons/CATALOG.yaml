# ─── INSTRUÇÕES PARA content-generator ──────────────────────────
# 1. Lê CATALOG.yaml.icons no boot
# 2. No prompt, passa lista de filenames disponíveis + tags
# 3. LLM PRECISA escolher icon SÓ desta lista
# 4. Se LLM precisa icon que não existe: tenta match semântico via tags
# 5. Se nem match: fallback pra icon-painel.png (genérico clínico) + flag em audit log

# Future: Higgsfield retry pra GERAR icon novo quando match score < threshold.
