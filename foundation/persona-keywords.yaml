# Persona Keywords — detecção determinística com strong/weak signals
# v1.0 — 2026-05-22 (D1)
#
# Regra de peso:
#   - strong_signal:  match = +3 pontos (definitivo da persona)
#   - weak_signal:    match = +1 ponto (overlap com outras personas)
#
# Decisão:
#   - Maior score = persona detectada
#   - Se TOP 2 personas empatam SOMENTE em weak_signals → LLM tiebreaker
#   - Se zero matches em qualquer persona → LLM cold call
#
# Mira: cada peça serve hero ICP via UMA das 4 personas (Maria/Julia/Pedro/Ana)

version: "1.0"
updated: "2026-05-22"

