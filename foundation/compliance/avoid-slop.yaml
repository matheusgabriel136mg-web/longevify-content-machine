# Avoid-Slop Deterministic Rules — Longevify
# Source-of-truth: foundation/master-avoid-slop.md (human-readable)
# This file: machine-readable rules for editor-agent deterministic scan
# v1.0 — 2026-05-22 (D0)
# Severity: grave (auto-reject) | medio (-1.0) | leve (-0.5)

version: "1.0"
