# ─── 2. Banned tokens (single words, case-insensitive, isolated word match) ───
banned_tokens:
  - token: "transformação"
    severity: medio
    category: vocabulary
  - token: "empoderar"
    severity: medio
    category: vocabulary
  - token: "jornada"
    severity: leve
    category: overused
    note: "permitido se contexto específico (jornada do dado), banido se genérico"
  - token: "inovador"
    severity: leve
    category: vocabulary-vazia
  - token: "revolucionário"
    severity: leve
    category: vocabulary-vazia
    note: "permitido se amarrado a evidência citada"
  - token: "solução"
    severity: leve
    category: generic
  - token: "incrível"
    severity: medio
    category: adjetivo-vazio
  - token: "poderoso"
    severity: medio
    category: adjetivo-vazio

# ─── 3. Regex patterns ─────────────────────────────────────────────────────────
banned_regex:
  - pattern: "(—.*){3,}"          # 3+ em-dashes no mesmo bloco
    severity: leve
    category: punctuation-tell
    description: "3+ em-dashes em parágrafo"

  - pattern: "[!]{1,}"             # ANY exclamation in body copy
    severity: leve
    category: punctuation-tell
    description: "ponto de exclamação (zero em body copy)"
    scope: body  # Only flag in body, not in legitimate quotes

  - pattern: "\\.{4,}"             # 4+ dots = excessive ellipsis
    severity: leve
    category: punctuation-tell
    description: "reticências excessivas"

  - pattern: "[A-ZÁ-Ú]{4,}\\s+[A-ZÁ-Ú]{4,}" # ALL CAPS sequences (2+ words)
    severity: medio
    category: caps-lock
    description: "CAPS LOCK pra ênfase"

# ─── 4. Emoji policy ──────────────────────────────────────────────────────────
emoji_policy:
  allowed:
    - "✓"      # check em listas curtas
    - "→"      # seta em CTAs
    - "·"      # separador
    - "🇧🇷"     # contextual raro
    - "❄️"      # contextual raro

  banned:
    - "✨"
    - "🚀"
    - "💪"
    - "🔥"
    - "💯"
    - "🙌"
    - "❤️‍🩹"
    - "🧬"
    - "📊"
    - "📈"
    - "📉"

  rules:
    max_per_post: 1
    forbidden_in_headlines: true
    severity_if_banned: grave
    severity_if_over_max: medio

# ─── 5. Tom proibido (regex + LLM hybrid) ─────────────────────────────────────
forbidden_tom_patterns:
  - pattern: "(dr\\.|doutor[a]?|médic[oa])\\s+[A-Z][a-zà-ú]+"
    severity: grave
    category: ataque-medico-nominal
    description: "Atacar médico nominalmente — CFM 2.336/2023"
    requires_llm_check: true   # LLM verifica se é ATAQUE ou apenas menção neutra

  - pattern: "SUS\\b"
    severity: medio
    category: ataque-sus
    description: "Atacar SUS"
    requires_llm_check: true   # LLM verifica se é ataque ou referência neutra

  - pattern: "(vamos refletir|vamos pensar) sobre"
    severity: medio
    category: tom-palestrante

  - pattern: "a verdade que ninguém te conta"
    severity: grave
    category: tom-guru

  - pattern: "(garantimos|garantia de) (cura|recuperação|melhora)"
    severity: grave
    category: promessa-cura

# ─── 6. Estrutura proibida ────────────────────────────────────────────────────
structure_rules:
  - rule: max_em_dashes_per_paragraph
    value: 2
    severity: leve

  - rule: max_emoji_per_post
    value: 1
    severity: medio

  - rule: max_exclamation_in_body
    value: 0
    severity: leve

  - rule: max_headline_height_pct
    value: 60
    severity: medio
    note: "headline NÃO ocupa mais que 60% da altura"

  - rule: caps_lock_words_threshold
    value: 4
    severity: medio
    note: "4+ palavras consecutivas em CAPS = flag"

# ─── 7. Scoring impact ────────────────────────────────────────────────────────
scoring:
  grave_violation: reject     # qualquer 1 → reject automático sem LLM
  medio_violation_deduction: 1.0
  leve_violation_deduction: 0.5
  max_deduction_medio: 3.0
  max_deduction_leve: 1.5
  reject_threshold: 6.0       # se score após deduções < 6 → reject

