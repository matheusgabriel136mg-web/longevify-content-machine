<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Longevify — Visual DNA Dashboard</title>
<style>
  :root {
    --bg: #f8fffc;
    --bg-card: #ffffff;
    --bg-card-hover: #eef7f2;
    --border: rgba(10,26,14,0.12);
    --text: #0a1a0e;
    --text-dim: #2e7d6e;
    --accent: #2e7d6e;
    --accent-deep: #1C3F3A;
    --action: #006070;
    --gold: #C89136;
    --shadow: 0 1px 3px rgba(10,26,14,0.06), 0 4px 16px rgba(10,26,14,0.04);
    --shadow-hover: 0 4px 12px rgba(10,26,14,0.08), 0 12px 32px rgba(10,26,14,0.08);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', -apple-system, system-ui, sans-serif;
    min-height: 100vh;
  }
  header {
    padding: 24px 32px 12px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, #f8fffc 0%, #eef7f2 100%);
  }
  h1 {
    margin: 0;
    font-weight: 300;
    letter-spacing: -0.02em;
    font-size: 28px;
  }
  h1 .accent { color: var(--accent); font-style: italic; }
  .meta {
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 6px;
  }
  .controls {
    padding: 16px 32px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .control-group { display: flex; flex-direction: column; gap: 4px; }
  .control-group label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
  }
  select, input[type="search"] {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 14px;
    min-width: 160px;
  }
  select:focus, input:focus { outline: 1px solid var(--accent); }
  .stats {
    margin-left: auto;
    font-size: 13px;
    color: var(--text-dim);
  }
  .stats span { color: var(--text); font-weight: 500; }

  .grid {
    padding: 24px 32px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s, background 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow);
  }
  .card:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
    box-shadow: var(--shadow-hover);
  }
  .card .img-wrap {
    position: relative;
    aspect-ratio: 4/5;
    background: #f0f3f0;
    overflow: hidden;
  }
  .card img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .badges {
    position: absolute;
    top: 8px; left: 8px;
    display: flex; gap: 4px; flex-wrap: wrap;
  }
  .badge {
    background: rgba(0,0,0,0.7);
    color: white;
    backdrop-filter: blur(8px);
    padding: 3px 8px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .badge.viral { background: var(--accent-deep); color: white; }
  .badge.format { background: rgba(46,125,110,0.85); color: white; }
  .badge.rich { background: var(--gold); color: #0a1a0e; }
  .badge.brand-Superpower { background: #2e7d6e; color: white; }
  .badge.brand-Mito\.Health { background: #006070; color: white; }
  .badge.brand-Function\.Health { background: #5BAE9E; color: #0a1a0e; }
  /* Badges no modal (sobre fundo branco) — versão pill outline */
  .modal .badge { box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
  .card .body {
    padding: 12px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .card .hook {
    font-size: 13px;
    line-height: 1.4;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card .footer {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    margin-top: auto;
  }
  .card .select-btn {
    position: absolute;
    top: 8px; right: 8px;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.95);
    border: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.15s;
    z-index: 5;
    color: var(--text-dim);
  }
  .card .select-btn:hover { background: var(--accent); color: white; transform: scale(1.1); }
  .card.selected .select-btn { background: var(--gold); color: #0a1a0e; }
  .card.selected { border-color: var(--gold); box-shadow: 0 0 0 2px var(--gold), var(--shadow-hover); }
  .selection-bar {
    display: flex; gap: 8px; align-items: center;
    padding: 0 8px; margin-left: 8px;
    background: rgba(200, 145, 54, 0.15);
    border: 1px solid var(--gold);
    border-radius: 8px;
    height: 32px;
  }
  .selection-bar .count { font-weight: 600; color: var(--gold); font-size: 13px; }
  .selection-bar button {
    background: var(--gold); color: #0a1a0e;
    border: none; border-radius: 4px;
    padding: 4px 10px; font-size: 11px; font-weight: 600;
    cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .selection-bar button:hover { opacity: 0.85; }
  .selection-bar button.secondary { background: transparent; color: var(--gold); border: 1px solid var(--gold); }

  /* Modal */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(4px);
    display: none;
    z-index: 100;
    overflow-y: auto;
    padding: 32px;
  }
  .modal-bg.open { display: flex; align-items: flex-start; justify-content: center; }
  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    max-width: 1000px;
    width: 100%;
    overflow: hidden;
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr);
    gap: 0;
    box-shadow: 0 24px 64px rgba(10,26,14,0.18);
    position: relative;
  }
  @media (max-width: 800px) { .modal { grid-template-columns: 1fr; } }
  .modal .left { background: #f0f3f0; }
  .modal .left img {
    width: 100%; aspect-ratio: 4/5; object-fit: contain;
    background: #fff;
  }
  .modal .right { padding: 24px; }
  .modal .close {
    position: absolute;
    top: 16px; right: 16px;
    background: rgba(255,255,255,0.95);
    border: 1px solid var(--border);
    color: var(--text);
    width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    z-index: 1;
  }
  .modal h2 { font-size: 18px; font-weight: 400; margin: 0 0 8px; line-height: 1.3; }
  .modal h3 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--accent);
    margin: 20px 0 8px;
  }
  .modal .field { font-size: 13px; line-height: 1.5; color: var(--text); }
  .modal pre {
    background: #f5f9f6;
    border: 1px solid var(--border);
    padding: 12px;
    border-radius: 8px;
    font-size: 12px;
    overflow-x: auto;
    white-space: pre-wrap;
    color: var(--text);
    line-height: 1.5;
    font-family: 'SF Mono', Menlo, monospace;
  }
  .copy-btn {
    background: var(--action);
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 6px;
  }
  .copy-btn:hover { background: var(--accent-deep); }
  .copy-btn.copied { background: var(--accent); }

  .palette {
    display: flex; gap: 4px; margin-top: 4px;
  }
  .palette .swatch {
    width: 24px; height: 24px; border-radius: 4px;
    border: 1px solid var(--border);
  }

  .ig-link {
    color: var(--accent);
    font-size: 12px;
    text-decoration: none;
    border-bottom: 1px solid var(--accent);
  }

  .empty { padding: 64px; text-align: center; color: var(--text-dim); }
  .loading { padding: 64px; text-align: center; color: var(--text-dim); }
</style>
</head>
<body>

<header>
  <h1>Longevify <span class="accent">Visual DNA</span> Dashboard</h1>
  <div class="meta" id="meta">Carregando…</div>
</header>

<div class="controls">
  <div class="control-group">
    <label>Marca</label>
    <select id="filter-brand">
      <option value="">Todas</option>
    </select>
  </div>
  <div class="control-group">
    <label>Formato</label>
    <select id="filter-format">
      <option value="">Todos</option>
      <option value="carousel">Carrossel</option>
      <option value="reel">Reel</option>
      <option value="image">Imagem</option>
    </select>
  </div>
  <div class="control-group">
    <label>Qualidade</label>
    <select id="filter-rich">
      <option value="">Todos</option>
      <option value="rich">⭐ Só GPT-5 rich</option>
      <option value="selected">⭐ Só selecionados</option>
    </select>
  </div>
  <div class="control-group">
    <label>Ordenar por</label>
    <select id="sort">
      <option value="viral">Viralização (desc)</option>
      <option value="random">Aleatório</option>
    </select>
  </div>
  <div class="control-group" style="flex: 1; min-width: 220px;">
    <label>Busca (hook/caption)</label>
    <input type="search" id="search" placeholder="ex: heart, sleep, cortisol…" />
  </div>
  <div class="stats" id="stats"></div>
  <div class="selection-bar" id="selection-bar" style="display:none;">
    <span class="count"><span id="sel-count">0</span> selecionados</span>
    <button onclick="exportSelection()">Export JSON</button>
    <button class="secondary" onclick="clearSelection()">Limpar</button>
  </div>
</div>

<div id="grid" class="grid"></div>
<div id="empty" class="empty" style="display:none;">Nenhum post bate com os filtros.</div>
<div id="loading" class="loading">Carregando dashboard-data.json…</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal" onclick="event.stopPropagation()">
    <button class="close" id="close">×</button>
    <div class="left"><img id="m-img" referrerpolicy="no-referrer" src="" alt="" /></div>
    <div class="right" id="m-right"></div>
  </div>
</div>

<script>
let data = null;
let filtered = [];
let selected = new Set(JSON.parse(localStorage.getItem('selectedReels') || '[]'));

function persistSelection() {
  localStorage.setItem('selectedReels', JSON.stringify([...selected]));
}

function toggleSelect(p) {
  if (selected.has(p.url)) selected.delete(p.url);
  else selected.add(p.url);
  persistSelection();
}

function updateSelectionBar() {
  const bar = document.getElementById('selection-bar');
  const count = selected.size;
  document.getElementById('sel-count').textContent = count;
  bar.style.display = count > 0 ? 'flex' : 'none';
}

function exportSelection() {
  if (!selected.size) return;
  const items = data.posts.filter(p => selected.has(p.url));
  const payload = {
    exportedAt: new Date().toISOString(),
    count: items.length,
    items: items.map(p => ({
      url: p.url,
      brand: p.brand,
      format: p.format,
      hookLine: p.hookLine,
      caption: p.caption,
      vsMedian: p.vsMedian,
      displayUrl: p.displayUrl,
      videoUrl: p.videoUrl,
      isRich: p.isRich,
    })),
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `longevify-selection-${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function clearSelection() {
  if (!confirm(`Limpar ${selected.size} selecionados?`)) return;
  selected.clear();
  persistSelection();
  updateSelectionBar();
  render();
}

async function load() {
  try {
    const res = await fetch('./dashboard-data.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    data = await res.json();
    document.getElementById('loading').style.display = 'none';
    initFilters();
    render();
  } catch (e) {
    document.getElementById('loading').textContent = 'Erro: ' + e.message + '. Roda `npm run build-dashboard` primeiro.';
  }
}

function initFilters() {
  const brands = [...new Set(data.posts.map(p => p.brand))].sort();
  const sel = document.getElementById('filter-brand');
  for (const b of brands) {
    const opt = document.createElement('option');
    opt.value = b; opt.textContent = b;
    sel.appendChild(opt);
  }
  document.getElementById('meta').textContent =
    `${data.total} posts · ${brands.join(' · ')} · gerado ${new Date(data.generatedAt).toLocaleString('pt-BR')}`;
  updateSelectionBar();

  for (const id of ['filter-brand','filter-format','filter-rich','sort','search']) {
    document.getElementById(id).addEventListener('input', render);
  }
  document.getElementById('modal-bg').addEventListener('click', closeModal);
  document.getElementById('close').addEventListener('click', closeModal);
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
}

function applyFilters() {
  const brand = document.getElementById('filter-brand').value;
  const format = document.getElementById('filter-format').value;
  const rich = document.getElementById('filter-rich').value;
  const sort = document.getElementById('sort').value;
  const q = document.getElementById('search').value.trim().toLowerCase();

  let arr = data.posts.slice();
  if (brand) arr = arr.filter(p => p.brand === brand);
  if (format) arr = arr.filter(p => p.format === format);
  if (rich === 'rich') arr = arr.filter(p => p.isRich);
  if (rich === 'selected') arr = arr.filter(p => selected.has(p.url));
  if (q) arr = arr.filter(p =>
    (p.hookLine || '').toLowerCase().includes(q) ||
    (p.caption || '').toLowerCase().includes(q));

  if (sort === 'random') {
    arr.sort(() => Math.random() - 0.5);
  } else {
    arr.sort((a, b) => b.vsMedian - a.vsMedian);
  }

  filtered = arr;
}

function render() {
  applyFilters();
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('stats').innerHTML = `<span>${filtered.length}</span> de ${data.total}`;
  document.getElementById('empty').style.display = filtered.length === 0 ? 'block' : 'none';

  for (let i = 0; i < filtered.length; i++) {
    grid.appendChild(makeCard(filtered[i], i));
  }
}

function makeCard(p, i) {
  const card = document.createElement('div');
  card.className = 'card';
  if (selected.has(p.url)) card.classList.add('selected');
  card.onclick = (e) => {
    if (e.target.classList.contains('select-btn')) return;
    openModal(p);
  };

  const img = p.localImage ?? p.displayUrl ?? '';
  const vs = p.vsMedian.toFixed(2);
  const brandClass = 'brand-' + p.brand.replace(/\s+/g, '.');

  card.innerHTML = `
    <button class="select-btn" data-url="${escapeHtml(p.url)}" title="Selecionar pra replicar">${selected.has(p.url) ? '★' : '☆'}</button>
    <div class="img-wrap">
      ${img ? `<img loading="lazy" referrerpolicy="no-referrer" src="${img}" alt="" onerror="this.parentElement.classList.add('img-failed'); this.style.display='none'" />` : ''}
      <div class="badges">
        ${p.isRich ? '<span class="badge rich">⭐ Rich</span>' : ''}
        <span class="badge ${brandClass}">${p.brand}</span>
        <span class="badge format">${p.format}</span>
        ${p.vsMedian > 0 ? `<span class="badge viral">${vs}x</span>` : ''}
      </div>
    </div>
    <div class="body">
      <div class="hook">${escapeHtml(p.hookLine || '(sem hook)')}</div>
      <div class="footer">
        <span>${p.primary?.style || ''}</span>
        <span>${p.primary?.mood || ''}</span>
      </div>
    </div>
  `;
  card.querySelector('.select-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    toggleSelect(p);
    card.classList.toggle('selected', selected.has(p.url));
    e.target.textContent = selected.has(p.url) ? '★' : '☆';
    updateSelectionBar();
    if (document.getElementById('filter-rich').value === 'selected') render();
  });
  return card;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function openModal(p) {
  document.getElementById('m-img').src = p.localImage || p.displayUrl || '';
  const r = document.getElementById('m-right');
  const palette = (p.primary?.palette || []).slice(0, 6);

  let slidesHtml = '';
  if (p.slides && p.slides.length > 1) {
    slidesHtml = `<h3>Slides do carrossel (${p.slides.length})</h3>` +
      p.slides.map(s => `
        <details style="margin-bottom: 8px;">
          <summary style="cursor:pointer; font-size:12px; color:var(--text-dim);">Slide ${s.slideNum} [${s.role}] — ${escapeHtml(s.subject || '')}</summary>
          <div style="padding: 8px 0; font-size: 12px; line-height: 1.5;">
            <strong>Composição:</strong> ${escapeHtml(s.composition || '')}<br/>
            <strong>Style:</strong> ${escapeHtml(s.style || '')}<br/>
            ${s.textOverlay ? `<strong>Texto:</strong> "${escapeHtml(s.textOverlay)}"<br/>` : ''}
            <strong>Prompt:</strong>
            <pre>${escapeHtml(s.prompt || '')}</pre>
          </div>
        </details>
      `).join('');
  }

  r.innerHTML = `
    <h2>${escapeHtml(p.hookLine || '(sem hook)')}</h2>
    <div style="display:flex; gap:8px; margin-bottom: 8px; flex-wrap: wrap;">
      ${p.isRich ? '<span class="badge rich">⭐ Rich</span>' : ''}
      <span class="badge brand-${p.brand.replace(/\s+/g, '.')}">${p.brand}</span>
      <span class="badge format">${p.format}</span>
      ${p.vsMedian > 0 ? `<span class="badge viral">${p.vsMedian.toFixed(2)}x</span>` : ''}
    </div>
    <div class="field"><a href="${p.url}" target="_blank" class="ig-link">Abrir no Instagram ↗</a></div>

    <h3>O que prende o olho</h3>
    <div class="field">${escapeHtml(p.primary?.hookSignal || '')}</div>

    <h3>Visual DNA</h3>
    <div class="field">
      <strong>Subject:</strong> ${escapeHtml(p.primary?.subject || '')}<br/>
      <strong>Mood:</strong> ${escapeHtml(p.primary?.mood || '')} · <strong>Style:</strong> ${escapeHtml(p.primary?.style || '')}<br/>
      <strong>Composição:</strong> ${escapeHtml(p.primary?.composition || '')}
    </div>
    <div class="palette">
      ${palette.map(c => `<div class="swatch" style="background:${escapeHtml(c)}" title="${escapeHtml(c)}"></div>`).join('')}
    </div>

    <h3>Prompt EN ${p.isRich ? '(GPT-5)' : '(Gemini Flash)'}</h3>
    <pre id="m-prompt">${escapeHtml(p.primary?.prompt || '')}</pre>
    <button class="copy-btn" onclick="copyText(this, document.getElementById('m-prompt').textContent)">Copy prompt</button>

    ${p.primary?.artDirection ? `
      <h3>Direção de arte (PT) — GPT-5</h3>
      <pre id="m-art">${escapeHtml(p.primary.artDirection)}</pre>
      <button class="copy-btn" onclick="copyText(this, document.getElementById('m-art').textContent)">Copy art direction</button>
    ` : ''}

    ${slidesHtml}
  `;
  document.getElementById('modal-bg').classList.add('open');
}

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
  });
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
}

load();
</script>

</body>
</html>
